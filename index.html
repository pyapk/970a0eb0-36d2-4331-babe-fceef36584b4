    [data-theme="light"] {

      --surface-glass: rgba(255, 255, 255, 0.88);
      --border-glow: rgba(0, 0, 0, 0.1);

    body {

    body::after {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-overlay);
      backdrop-filter: blur(2px);
      z-index: -1;

      gap: 0.8rem;

    .lang-selector {

    .lang-dropdown {

      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glow);

    .lang-option {

    .lang-option:hover {

    }
    .theme-toggle-mini {

      border-radius: 40px;
      padding: 0.3rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: var(--transition-default);

    .main-title {

      background: #0a0c15;
    }

    .player-placeholder {

      align-items: center;
      justify-content: center;
      background: var(--player-bg);
      color: var(--text-secondary);

    .action-buttons {

    .btn {

    .channels-panel {

    .panel-header {
      display: flex;

    .channel-item {

    .item-info {

    .item-title {

      margin-bottom: 0.2rem;

      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;

    .score-badge {
      background: rgba(0,0,0,0.5);
      padding: 0.1rem 0.4rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: monospace;
      font-weight: 700;
      color: var(--accent-gold);
    }
    .item-status {
      font-size: 0.7rem;
      color: var(--status-live);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .play-icon-small {
      background: var(--accent-gold);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .play-icon-small:hover {
      transform: scale(1.08);
    }

    .toast-error {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444dd;
      backdrop-filter: blur(12px);
      padding: 0.7rem 1.6rem;

      z-index: 200;

      align-items: center;
      gap: 0.6rem;

    }

    .channels-panel::-webkit-scrollbar {
      width: 4px;
    }
    .channels-panel::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }
    .channels-panel::-webkit-scrollbar-thumb {
      background: var(--accent-gold);

    .promo-banner {

      cursor: pointer;

    .promo-banner img {

    @media (max-width: 950px) {
      .main-layout {

        gap: 1.5rem;
      }
      .app-container {
        padding: 0.8rem;
      }
      .action-buttons {
        flex-direction: column;
      }
      .social-btn {
        padding: 0.45rem 1.2rem;
        font-size: 0.85rem;
      }
    }
    @media (max-width: 560px) {
      .top-bar {
        justify-content: flex-end;
      }
      .channel-head {
        flex-direction: column;
        align-items: flex-start;
      }
      .embedded-player {
        margin: 0.8rem;
      }
      .action-buttons {
        padding: 0rem 1rem 1.2rem 1rem;
      }
      .social-buttons-bar {
        gap: 0.8rem;

      .social-btn {
        padding: 0.4rem 1rem;

      }
      .main-title {
        letter-spacing: 1px;
      }
      .promo-banner {
        margin: 0rem 0.8rem 1rem 0.8rem;
      }
    }
  </style>
</head>

    const currentLogoImg = document.getElementById('currentLogoImg');
    const currentChannelLabel = document.getElementById('currentChannelLabel');
    const playNowBtn = document.getElementById('playNowBtn');
    const refreshListBtn = document.getElementById('refreshListBtn');
    const channelsContainer = document.getElementById('channelsContainer');
    const channelTotalCountSpan = document.getElementById('channelTotalCount');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeTextMini = document.getElementById('themeTextMini');
    const themeIconSpan = document.getElementById('themeIcon');
    const proxyToggleBtn = document.getElementById('proxyToggleBtn');
    const proxyToggleText = document.getElementById('proxyToggleText');
    const embeddedContainer = document.getElementById('embeddedPlayerContainer');
    const toastEl = document.getElementById('globalToast');
    const toastMsgSpan = document.getElementById('toastMsg');
    const streamStateBadge = document.getElementById('streamStateBadge');

    const langSelectorBtn = document.getElementById('langSelectorBtn');
    const currentLangTextSpan = document.getElementById('currentLangText');
    const siteTitle = document.getElementById('siteTitle');
    const subNote1 = document.getElementById('subNote1');
    const subNote2 = document.getElementById('subNote2');
    const liveStatusTextSpan = document.getElementById('liveStatusText');
    const placeholderLine1 = document.getElementById('placeholderLine1');
    const placeholderLine2 = document.getElementById('placeholderLine2');
    const playBtnText = document.getElementById('playBtnText');
    const refreshBtnText = document.getElementById('refreshBtnText');
    const channelPanelTitle = document.getElementById('channelPanelTitle');

    const translations = {
      'zh-CN': {
        siteTitle: '2026世界杯直播', subNote1: '🏆 美加墨 · 三国同心', subNote2: '⚡ 全高清嵌入直播',
        liveStatus: 'LIVE · 就绪', placeholder1: '点击「立即观看」或频道▶️', placeholder2: '内嵌直播将直接播放', playBtn: '立即观看', refreshBtn: '刷新频道',
        panelTitle: '📡 直播频道', streamBadge: '📡 内嵌播放器', selectChannel: '选择频道', noChannel: '无频道', liveReady: '🎬 内嵌直播 · 就绪', noSignal: '⚠️ 无信号',
        loadingChannels: '加载直播源...', noSource: '暂无直播源，请刷新', fetchSuccess: '✅ 加载成功 ({count}个频道)', fetchFail: '加载失败: {msg}', embeddedSupport: '内嵌支持',
        clickPlay: '点击「立即观看」或频道▶️', directPlay: '内嵌直播将直接播放'
      },
      'zh-TW': {
        siteTitle: '2026世界盃直播', subNote1: '🏆 美加墨 · 三國同心', subNote2: '⚡ 全高清嵌入直播',
        liveStatus: 'LIVE · 就緒', placeholder1: '點擊「立即觀看」或頻道▶️', placeholder2: '內嵌直播將直接播放', playBtn: '立即觀看', refreshBtn: '刷新頻道',
        panelTitle: '📡 直播頻道', streamBadge: '📡 內嵌播放器', selectChannel: '選擇頻道', noChannel: '無頻道', liveReady: '🎬 內嵌直播 · 就緒', noSignal: '⚠️ 無信號',
        loadingChannels: '載入直播源...', noSource: '暫無直播源，請刷新', fetchSuccess: '✅ 載入成功 ({count}個頻道)', fetchFail: '載入失敗: {msg}', embeddedSupport: '內嵌支援',
        clickPlay: '點擊「立即觀看」或頻道▶️', directPlay: '內嵌直播將直接播放'
      },
      'en': {
        siteTitle: '2026 World Cup Live', subNote1: '🏆 USA·CAN·MEX', subNote2: '⚡ Full HD Embedded',
        liveStatus: 'LIVE · Ready', placeholder1: 'Click "Watch Now" or channel ▶️', placeholder2: 'Embedded stream will play', playBtn: 'Watch Now', refreshBtn: 'Refresh',
        panelTitle: '📡 Live Channels', streamBadge: '📡 Embedded Player', selectChannel: 'Select Channel', noChannel: 'No Channel', liveReady: '🎬 Embedded Live · Ready', noSignal: '⚠️ No Signal',
        loadingChannels: 'Loading sources...', noSource: 'No streams, please refresh', fetchSuccess: '✅ Loaded {count} channels', fetchFail: 'Failed: {msg}', embeddedSupport: 'Embedded',
        clickPlay: 'Click "Watch Now" or ▶️', directPlay: 'Embedded playback'
      }
    };

    let currentLang = 'zh-CN';

    function updateUILanguage() {
      const t = translations[currentLang];
      if(!t) return;
      siteTitle.innerText = t.siteTitle;
      subNote1.innerText = t.subNote1; subNote2.innerText = t.subNote2; liveStatusTextSpan.innerText = t.liveStatus;
      placeholderLine1.innerText = t.placeholder1; placeholderLine2.innerText = t.placeholder2; playBtnText.innerText = t.playBtn;
      refreshBtnText.innerText = t.refreshBtn; channelPanelTitle.innerText = t.panelTitle; streamStateBadge.innerHTML = t.streamBadge;
      if(currentChannel) currentChannelLabel.innerText = currentChannel.title;
      else currentChannelLabel.innerText = t.selectChannel;
      if(channels.length === 0 && !isLoading) channelsContainer.innerHTML = `<div style="text-align:center; padding:2rem;">${t.noSource}</div>`;
      else if(channels.length > 0) renderChannelList();
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('wc_lang', lang);
      if(lang === 'zh-CN') currentLangTextSpan.innerText = '简体';
      else if(lang === 'zh-TW') currentLangTextSpan.innerText = '繁體';
      else currentLangTextSpan.innerText = 'EN';
      updateUILanguage();
    }

    function showToast(msg, isErr=true) {
      const t = translations[currentLang];
      let displayMsg = msg;
      if(msg.includes('✅ 加载成功') && t && t.fetchSuccess) {
        const match = msg.match(/(\d+)/);
        if(match) displayMsg = t.fetchSuccess.replace('{count}', match[0]);
        else displayMsg = t.fetchSuccess.replace('{count}', '?');
      } else if(msg.includes('加载失败') && t && t.fetchFail) {
        const errMatch = msg.match(/: (.+)/);
        if(errMatch) displayMsg = t.fetchFail.replace('{msg}', errMatch[1]);
        else displayMsg = t.fetchFail.replace('{msg}', '');
      }
      toastMsgSpan.innerText = displayMsg;
      toastEl.style.display = 'flex';
      setTimeout(()=> toastEl.style.display = 'none', 4000);
    }

    function getProxiedUrl(originalUrl) {
      if(!proxyEnabled) return originalUrl;
      try {
        const url = new URL(originalUrl);
        return PROXY_SERVER + url.host + url.pathname + url.search;
      } catch(e) {
        return originalUrl;
      }
    }

    function extractScoreFromTitle(title) {
      const patterns = [
        /(\d+)\s*[-:]\s*(\d+)/,
        /(\d+)–(\d+)/,
        /(\d+)\s*vs\s*\d+/i
      ];
      for(let p of patterns) {
        const match = title.match(p);
        if(match && match[1] && match[2]) return `${match[1]} - ${match[2]}`;
      }
      return null;
    }

    function getDefaultLogo(channelName) {
      const name = channelName.toLowerCase();
      if(name.includes('cctv5')) return 'https://upload.wikimedia.org/wikipedia/zh/4/4e/CCTV-5_logo.png';
      if(name.includes('咪咕')) return 'https://img.alicdn.com/imgextra/i3/6000000007344/O1CN01KjR1jT24CxJ6XoFz7_!!6000000007344-0-tps-200-200.jpg';
      if(name.includes('腾讯')) return 'https://mat1.gtimg.com/www/images/qq2012/qqlogo_1x.png';
      if(name.includes('爱奇艺')) return 'https://www.iqiyipic.com/common/fix/site-v4/iQIYIlogo-white.png';
      if(name.includes('纬来')) return 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/VL_Sport_logo.svg/200px-VL_Sport_logo.svg.png';
      return 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 40 40\'%3E%3Crect width=\'40\' height=\'40\' fill=\'%23f5b81b\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' dy=\'.3em\' fill=\'white\'%3E📺%3C/text%3E%3C/svg%3E';
    }

    function parseM3U(content) {
      const lines = content.split(/\r?\n/);
      const result = [];
      let currentExtinf = null;
      for(let i=0;i<lines.length;i++){
        const line = lines[i].trim();
        if(line.startsWith('#EXTINF:')){
          const info = line.substring(8);
          const commaIdx = info.lastIndexOf(',');
          let title = commaIdx !== -1 ? info.substring(commaIdx+1) : info;
          title = title.trim() || '未知频道';
          let logo = null;
          let groupTitle = null;
          const logoMatch = info.match(/tvg-logo="([^"]*)"/);
          if(logoMatch && logoMatch[1].startsWith('http')) logo = logoMatch[1];
          const groupMatch = info.match(/group-title="([^"]*)"/);
          if(groupMatch) groupTitle = groupMatch[1];
          currentExtinf = { title, logo, groupTitle };
        } else if(line && !line.startsWith('#') && currentExtinf){
          if(line.startsWith('http')){
            result.push({
              title: currentExtinf.title,
              url: line,
              logo: currentExtinf.logo || getDefaultLogo(currentExtinf.title),
              group: currentExtinf.groupTitle || null,
              score: extractScoreFromTitle(currentExtinf.title)
            });
          }
          currentExtinf = null;
        }
      }
      return result;
    }

    function sortChannelsWeilaiLast(rawChannels) {
      const weilai = [], others = [];
      rawChannels.forEach(ch => {
        if(ch.title.toLowerCase().includes('纬来') || ch.title.includes('纬來')) weilai.push(ch);
        else others.push(ch);
      });
      return [...others, ...weilai];
    }

    function destroyCurrentPlayer() {
      if(currentVideoElement) {
        currentVideoElement.pause();
        currentVideoElement.src = '';
        currentVideoElement.load();
        currentVideoElement = null;
      }
      if(embeddedContainer) {
        const oldVideo = embeddedContainer.querySelector('video');
        if(oldVideo) {
          oldVideo.pause();
          oldVideo.src = '';
          oldVideo.load();
        }
      }
    }

    function embedStreamIntoPlayer(url) {
      if(!url) { showToast('播放地址无效'); return false; }
      destroyCurrentPlayer();
      const container = embeddedContainer;
      if(!container) return false;
      container.innerHTML = '';
      
      const finalUrl = getProxiedUrl(url);
      const lowerUrl = finalUrl.toLowerCase();
      
      if(lowerUrl.includes('.m3u8') || lowerUrl.includes('.mp4') || lowerUrl.match(/\.(ts|m3u8)(\?|$)/i)){
        const videoElement = document.createElement('video');
        videoElement.controls = true;
        videoElement.autoplay = true;
        videoElement.playsInline = true;
        videoElement.style.width = '100%';
        videoElement.style.height = '100%';
        videoElement.style.objectFit = 'contain';
        videoElement.style.backgroundColor = '#000';
        const source = document.createElement('source');
        source.src = finalUrl;
        source.type = lowerUrl.includes('.m3u8') ? 'application/vnd.apple.mpegurl' : 'video/mp4';
        videoElement.appendChild(source);
        container.appendChild(videoElement);
        currentVideoElement = videoElement;
        
        let errorCount = 0;
        const handleError = () => {
          errorCount++;
          if(errorCount <= 2) {
            showToast(`连接异常，尝试重连 (${errorCount}/2)...`, false);
            setTimeout(() => {
              if(videoElement && videoElement.parentNode) {
                videoElement.load();
              }
            }, 2000);
          } else {
            showToast('播放源可能已失效，请尝试切换线路', true);
          }
        };
        videoElement.addEventListener('error', handleError);
        
        videoElement.play().catch(e => { 
          console.warn('自动播放被阻止', e); 
          showToast('请手动点击播放', false);
          streamStateBadge.innerHTML = '🔊 需手动播放';
        });
        
        const cleanup = () => {
          videoElement.removeEventListener('error', handleError);
        };
        videoElement.addEventListener('play', cleanup, { once: true });
        return true;
      } 
      else if(url.includes('.pl') || url.includes('youtube.com/embed') || url.includes('player') || url.includes('iframe')){
        const iframeElement = document.createElement('iframe');
        iframeElement.src = finalUrl; iframeElement.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
        iframeElement.allowFullscreen = true; iframeElement.style.width = '100%'; iframeElement.style.height = '100%'; iframeElement.style.border = 'none';
        container.appendChild(iframeElement);
        return true;
      }
      else {
        const fallbackDiv = document.createElement('div');
        fallbackDiv.className = 'player-placeholder';
        fallbackDiv.innerHTML = `<span>⚠️ 该链接不支持内嵌播放</span><span style="font-size:0.7rem;">点击下方按钮新窗口观看</span><button id="fallbackOpenBtn" style="margin-top:8px; background:gold; border:none; padding:6px 12px; border-radius:40px;">在新窗口播放</button>`;
        container.appendChild(fallbackDiv);
        document.getElementById('fallbackOpenBtn')?.addEventListener('click',()=>{ window.open(finalUrl, '_blank'); });
        return false;
      }
    }

    function showPlaceholder() {
      destroyCurrentPlayer();
      const t = translations[currentLang];
      embeddedContainer.innerHTML = `<div class="player-placeholder"><span>⚽🏆</span><span>${t ? t.clickPlay : '点击「立即观看」或频道▶️'}</span><span style="font-size:0.8rem;">${t ? t.directPlay : '内嵌直播将直接播放'}</span></div>`;
      currentVideoElement = null;
    }

    function updateCurrentUI(channel) {
      const t = translations[currentLang];
      if(channel){
        currentLogoImg.src = channel.logo;
        currentChannelLabel.innerText = channel.title;
        streamStateBadge.innerHTML = t ? t.liveReady : '🎬 内嵌直播 · 就绪';
        playNowBtn.disabled = false;
      } else {
        currentLogoImg.src = 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 40 40\'%3E%3Crect width=\'40\' height=\'40\' fill=\'%23333\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' fill=\'white\'%3E📡%3C/text%3E%3C/svg%3E';
        currentChannelLabel.innerText = t ? t.noChannel : '无频道';
        playNowBtn.disabled = true;
        streamStateBadge.innerHTML = t ? t.noSignal : '⚠️ 无信号';
      }
    }

    function toggleGroup(groupName, headerElement) {
      const isCollapsed = groupCollapseState.get(groupName) || false;
      groupCollapseState.set(groupName, !isCollapsed);
      if(headerElement) {
        if(!isCollapsed) headerElement.classList.add('collapsed');
        else headerElement.classList.remove('collapsed');
        const channelsDiv = headerElement.nextElementSibling;
        if(channelsDiv && channelsDiv.classList.contains('category-channels')) {
          if(!isCollapsed) {
            channelsDiv.style.maxHeight = '0px';
            channelsDiv.classList.add('collapsed');
          } else {
            channelsDiv.style.maxHeight = channelsDiv.scrollHeight + 'px';
            channelsDiv.classList.remove('collapsed');
          }
        }
      }
    }

    function renderChannelList() {
      const t = translations[currentLang];
      if(!channels.length){
        channelsContainer.innerHTML = `<div style="text-align:center; padding:2rem;">${t ? t.noSource : '暂无直播源，请刷新'}</div>`;
        channelTotalCountSpan.innerText = '(0)';
        return;
      }
      channelTotalCountSpan.innerText = `(${channels.length})`;
      const activeId = currentChannel ? currentChannel.url : null;
      const groups = new Map();
      for(const ch of channels) {
        const groupName = ch.group && ch.group.trim() !== '' ? ch.group : '其他赛事';
        if(!groups.has(groupName)) groups.set(groupName, []);
        groups.get(groupName).push(ch);
      }
      let html = '';
      for(const [groupName, groupChannels] of groups.entries()) {
        const isCollapsed = groupCollapseState.get(groupName) || false;
        const collapsedClass = isCollapsed ? 'collapsed' : '';
        const iconClass = isCollapsed ? '▶' : '▼';
        html += `<div class="category-group" data-group-name="${escapeHtml(groupName)}">
          <div class="category-header ${collapsedClass}" data-group="${escapeHtml(groupName)}">
            <span>${escapeHtml(groupName)}</span>
            <span class="toggle-icon">${iconClass}</span>
          </div>
          <div class="category-channels ${collapsedClass}" style="${isCollapsed ? 'max-height:0px;' : ''}">`;
        for(const ch of groupChannels) {
          const globalIdx = channels.findIndex(c => c.url === ch.url);
          const scoreHtml = ch.score ? `<span class="score-badge">${ch.score}</span>` : '';
          html += `
            <div class="channel-item ${activeId === ch.url ? 'active' : ''}" data-index="${globalIdx}">
              <img class="item-logo" src="${ch.logo}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 40 40\'%3E%3Crect width=\'40\' height=\'40\' fill=\'%23f5b81b\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' dy=\'.3em\' fill=\'white\'%3E📺%3C/text%3E%3C/svg%3E'">
              <div class="item-info">
                <div class="item-title">${escapeHtml(ch.title)} ${scoreHtml}</div>
                <div class="item-status"><span class="live-dot"></span> ${t ? t.embeddedSupport : '内嵌支持'}</div>
              </div>
              <div class="play-icon-small" data-playidx="${globalIdx}">▶</div>
            </div>
          `;
        }
        html += `</div></div>`;
      }
      channelsContainer.innerHTML = html;
      document.querySelectorAll('.category-header').forEach(header => {
        const groupName = header.getAttribute('data-group');
        header.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleGroup(groupName, header);
        });
      });
      document.querySelectorAll('.channel-item').forEach(el=>{
        const idx = el.dataset.index;
        if(idx!==undefined){
          el.addEventListener('click',(e)=>{
            if(e.target.classList.contains('play-icon-small')) return;
            selectChannelByIdx(parseInt(idx));
          });
          const playBtn = el.querySelector('.play-icon-small');
          if(playBtn){
            playBtn.addEventListener('click',(e)=>{
              e.stopPropagation();
              const pIdx = playBtn.dataset.playidx;
              if(pIdx!==undefined) playChannelByIdx(parseInt(pIdx));
            });
          }
        }
      });
      document.querySelectorAll('.category-channels').forEach(div => {
        if(div.style.maxHeight === '') {
          div.style.maxHeight = div.scrollHeight + 'px';
        }
      });
    }

    function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

    function selectChannelByIdx(index){
      if(channels[index]){
        currentChannel = channels[index];
        updateCurrentUI(currentChannel);
        renderChannelList();
        showPlaceholder();
      }
    }

    function playChannelByIdx(index){
      if(channels[index]){
        currentChannel = channels[index];
        updateCurrentUI(currentChannel);
        renderChannelList();
        embedStreamIntoPlayer(currentChannel.url);
      }
    }

    async function loadChannelsFromUrl(url){
      if(isLoading) return;
      isLoading = true;
      refreshListBtn.disabled = true;
      const t = translations[currentLang];
      channelsContainer.innerHTML = `<div style="text-align:center; padding:2rem;"><div class="live-dot" style="margin:0 auto;"></div> ${t ? t.loadingChannels : '加载直播源...'}</div>`;
      try{
        const finalUrl = url + (url.includes('?')?'&':'?') + '_ts='+Date.now();
        const resp = await fetch(finalUrl, { headers:{'Accept':'application/vnd.apple.mpegurl,*/*'}});
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        let parsed = parseM3U(text);
        if(parsed.length===0) throw new Error('未找到频道');
        parsed = sortChannelsWeilaiLast(parsed);
        channels = parsed;
        groupCollapseState.clear();
        if(!currentChannel || !channels.find(c=>c.url === currentChannel?.url)){
          currentChannel = channels[0];
        }
        updateCurrentUI(currentChannel);
        renderChannelList();
        showPlaceholder();
        showToast(`✅ 加载成功 (${channels.length}个频道)`, false);
      } catch(err){
        console.error(err);
        showToast(`加载失败: ${err.message}`);
        channels = [];
        currentChannel = null;
        updateCurrentUI(null);
        renderChannelList();
        showPlaceholder();
      } finally {
        isLoading = false;
        refreshListBtn.disabled = false;
      }
    }

    function refreshAll(){
      destroyCurrentPlayer();
      loadChannelsFromUrl(M3U_API_URL).catch(()=>{ loadChannelsFromUrl(FALLBACK_M3U_URL); });
    }

    function toggleProxy() {
      proxyEnabled = !proxyEnabled;
      if(proxyEnabled) {
        proxyToggleText.innerText = '代理:开';
        proxyToggleBtn.classList.add('active');
        showToast('已开启代理加速，可能会改善部分源的播放流畅度', false);
      } else {
        proxyToggleText.innerText = '代理:关';
        proxyToggleBtn.classList.remove('active');
        showToast('已关闭代理，将直连播放源', false);
      }
      if(currentVideoElement && currentChannel) {
        embedStreamIntoPlayer(currentChannel.url);
      }
    }

    let currentTheme = 'dark';
    function applyTheme(theme){
      document.documentElement.setAttribute('data-theme', theme);
      if(theme === 'light'){ themeTextMini.innerText = '浅色'; themeIconSpan.innerText = '☀️'; }
      else { themeTextMini.innerText = '深色'; themeIconSpan.innerText = '🌙'; }
      currentTheme = theme;
      localStorage.setItem('wc_theme', theme);
    }
    function toggleTheme(){ const newTheme = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(newTheme); }
    const savedTheme = localStorage.getItem('wc_theme');
    if(savedTheme) applyTheme(savedTheme); else applyTheme('dark');

    const savedLang = localStorage.getItem('wc_lang');
    if(savedLang && translations[savedLang]) setLanguage(savedLang); else setLanguage('zh-CN');

    langSelectorBtn.addEventListener('click', (e) => { e.stopPropagation(); langSelectorBtn.classList.toggle('active'); });
    document.querySelectorAll('.lang-option').forEach(opt => {
      opt.addEventListener('click', (e) => { e.stopPropagation(); const lang = opt.getAttribute('data-lang'); if(lang) setLanguage(lang); langSelectorBtn.classList.remove('active'); });
    });
    document.addEventListener('click', () => { langSelectorBtn.classList.remove('active'); });

    playNowBtn.addEventListener('click', ()=>{ 
      if(currentChannel && currentChannel.url) embedStreamIntoPlayer(currentChannel.url); 
      else showToast('暂无可用频道'); 
    });
    refreshListBtn.addEventListener('click', refreshAll);
    themeToggleBtn.addEventListener('click', toggleTheme);
    proxyToggleBtn.addEventListener('click', toggleProxy);

    refreshAll();
    setInterval(()=>{ 
      if(!isLoading) loadChannelsFromUrl(M3U_API_URL).catch(()=>loadChannelsFromUrl(FALLBACK_M3U_URL)); 
    }, 10 * 60 * 1000);
  })();
</script>
